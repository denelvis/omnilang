name: OmniLang CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check .omni specs (if any)
        run: |
          if ls src/**/*.omni 1>/dev/null 2>&1; then
            omni check .
          else
            echo "No .omni files to check"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Build release
        run: cargo build --workspace --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: omni-binaries
          path: |
            target/release/omni
            target/release/omni-lsp

  cost-report:
    name: Cost Report (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Generate cost estimate
        id: cost
        run: |
          if ls src/**/*.omni 1>/dev/null 2>&1; then
            omni plan . --format json > /tmp/plan.json
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with cost
        if: steps.cost.outputs.has_specs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('/tmp/plan.json', 'utf8'));
            const body = `## OmniLang Build Cost Estimate\n\n` +
              `| Metric | Value |\n` +
              `|--------|-------|\n` +
              `| Services | ${plan.services || 'N/A'} |\n` +
              `| RPCs | ${plan.rpcs || 'N/A'} |\n` +
              `| Tests | ${plan.tests || 'N/A'} |\n` +
              `| Estimated Cost | $${plan.estimated_cost || '0.00'} |\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
