name: OmniLang CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Install Z3 SMT Solver
        run: |
          sudo apt-get update
          sudo apt-get install -y z3

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json

      - name: Install Runtime dependencies
        run: npm ci --prefix runtime

      - name: Build Runtime
        run: npm run build --prefix runtime

      - name: Run Runtime tests with coverage
        run: npm test --prefix runtime -- --coverage

      - name: Run mock E2E build verification
        run: |
          OMNI_MOCK_LLM=true cargo run --bin omni -- build examples/stabilization_test.schema.omni --target typescript
          OMNI_MOCK_LLM=true cargo run --bin omni -- build examples/hybrid_billing.omni --target typescript

      - name: Run E2E Integration Test with Real LLM (Conditional)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NODE_PATH=runtime/node_modules npx ts-node --project runtime/tsconfig.json scripts/test-real-llm.ts

      - name: Verify examples with omni check
        run: |
          cargo run --bin omni -- check examples/checkout.omni
          cargo run --bin omni -- check examples/self_correction.omni
          cargo run --bin omni -- check examples/simple_greet.omni
          cargo run --bin omni -- check examples/stabilization_test.schema.omni
          cargo run --bin omni -- check examples/booking_flow.omni
          cargo run --bin omni -- check examples/hybrid_billing.omni


      - name: Check .omni specs (if any)
        run: |
          if ls src/**/*.omni 1>/dev/null 2>&1; then
            omni check .
          else
            echo "No .omni files to check"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Build release
        run: cargo build --workspace --release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: omni-binaries
          path: |
            target/release/omni
            target/release/omni-lsp

  cost-report:
    name: Cost Report (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup OmniLang
        uses: ./.github/actions/setup-omni

      - name: Generate cost estimate
        id: cost
        run: |
          if ls src/**/*.omni 1>/dev/null 2>&1; then
            omni plan . --format json > /tmp/plan.json
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with cost
        if: steps.cost.outputs.has_specs == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('/tmp/plan.json', 'utf8'));
            const body = `## OmniLang Build Cost Estimate\n\n` +
              `| Metric | Value |\n` +
              `|--------|-------|\n` +
              `| Services | ${plan.services || 'N/A'} |\n` +
              `| RPCs | ${plan.rpcs || 'N/A'} |\n` +
              `| Tests | ${plan.tests || 'N/A'} |\n` +
              `| Estimated Cost | $${plan.estimated_cost || '0.00'} |\n`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
